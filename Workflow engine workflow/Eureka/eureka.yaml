apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka
  namespace: $PROJECT_NAMESPACE
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  selector:
    matchLabels:
      app: eureka
      component: eureka
      tier: backend
  template:
    metadata:
      labels:
        app: eureka
        component: eureka
        tier: backend
    spec:
      containers:
      - image: $REGISTRY/$HARBOR_NAMESPACE/$APP_NAME:$BUILD_NUMBER
        imagePullPolicy: Always
        name: eureka
        ports:
        - containerPort: 8044
          protocol: TCP
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      imagePullSecrets:
         - name: $HARBOR_SECRET
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      terminationGracePeriodSeconds: 30