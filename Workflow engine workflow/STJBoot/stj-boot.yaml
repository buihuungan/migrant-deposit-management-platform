apiVersion: apps/v1
kind: Deployment
metadata:
  name: $APP_NAME
  namespace: $PROJECT_NAMESPACE
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  selector:
    matchLabels:
      app: $APP_NAME
      component: $APP_NAME
      tier: backend
  template:
    metadata:
      labels:
        app: $APP_NAME
        component: $APP_NAME
        tier: backend
    spec:
      containers:
      - image: $REGISTRY/$HARBOR_NAMESPACE/$APP_NAME:$BUILD_NUMBER
        imagePullPolicy: Always
        name: $APP_NAME
        ports:
        - containerPort: 35367
          protocol: TCP
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      imagePullSecrets:
         - name: $HARBOR_SECRET
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
