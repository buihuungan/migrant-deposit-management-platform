apiVersion: apps/v1
kind: Deployment
metadata:
  name: fmaking
  namespace: $PROJECT_NAMESPACE
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  selector:
    matchLabels:
      app: fmaking
      component: fmaking
      tier: backend
  template:
    metadata:
      labels:
        app: fmaking
        component: fmaking
        tier: backend
    spec:
      containers:
      - env:
        - name: K8s_SERVICE_NAME
          value: fmaking
        image: $REGISTRY/$HARBOR_NAMESPACE/$APP_NAME:$BUILD_NUMBER
        imagePullPolicy: Always
        name: fmaking
        ports:
        - containerPort: 8025
          protocol: TCP
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      imagePullSecrets:
         - name: $HARBOR_SECRET
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      terminationGracePeriodSeconds: 30